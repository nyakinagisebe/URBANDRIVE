<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URBANDRIVE KENYA - Sign Up</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap');
        
        body { font-family: 'Inter', system_ui, sans-serif; }
        .logo-font { font-family: 'Space Grotesk', sans-serif; }

        .hero-bg {
            background: linear-gradient(rgba(0, 0, 0, 0.45), rgba(0, 0, 0, 0.55)), 
                        url('images/nathan-waters-j7q-Z9DV3zw-unsplash.jpg') center/cover no-repeat;
        }
    </style>
</head>
<body class="bg-gray-950 text-white">
    <div class="min-h-screen flex">

        <!-- Left Side -->
        <div class="hidden lg:flex w-1/2 hero-bg bg-cover bg-center relative">
            <div class="absolute inset-0 flex flex-col justify-between p-10">

                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-emerald-400 rounded-xl flex items-center justify-center">
                        <i class="fa-solid fa-building text-white text-2xl"></i>
                    </div>
                    <div>
                        <span class="logo-font text-3xl font-semibold tracking-tight">URBANDRIVE</span>
                        <span class="block text-emerald-400 text-sm font-medium tracking-widest -mt-1">KENYA</span>
                    </div>
                </div>

                <div class="max-w-md">
                    <h1 class="text-4xl font-semibold leading-tight mb-6">
                        Join Kenya's leading<br>
                        Housing Intelligence Platform
                    </h1>
                    <p class="text-lg text-gray-200">
                        Create an account and start generating powerful housing analysis reports.
                    </p>
                </div>

            </div>
        </div>

        <!-- Right Side -->
        <div class="w-full lg:w-1/2 flex items-center justify-center p-8 bg-white">
            <div class="w-full max-w-md">

                <!-- Mobile Logo -->
                <div class="flex lg:hidden items-center gap-3 mb-10">
                    <div class="w-10 h-10 bg-emerald-500 rounded-2xl flex items-center justify-center">
                        <i class="fa-solid fa-building text-white text-3xl"></i>
                    </div>
                    <div>
                        <span class="logo-font text-3xl font-semibold text-gray-900 tracking-tight">URBANDRIVE</span>
                        <span class="block text-emerald-500 text-sm font-medium tracking-widest -mt-1">KENYA</span>
                    </div>
                </div>

                <div class="bg-white rounded-3xl shadow-xl p-8">
                    <h2 class="text-3xl font-semibold text-gray-900 mb-1">Create Account</h2>
                    <p class="text-gray-600 mb-8">Join us to access powerful insights</p>

                    <form id="signupForm">

                        <!-- Full Name -->
                        <div class="mb-6">
                            <label class="block text-sm font-medium text-gray-700 mb-2">Full Name</label>
                            <input type="text" id="fullname" required
                                   class="w-full bg-gray-50 border border-gray-200 focus:border-emerald-500 rounded-2xl py-4 px-5 outline-none text-gray-900"
                                   placeholder="Enter your full name">
                        </div>

                        <!-- Username -->
                        <div class="mb-6">
                            <label class="block text-sm font-medium text-gray-700 mb-2">Username</label>
                            <input type="text" id="username" required
                                   class="w-full bg-gray-50 border border-gray-200 focus:border-emerald-500 rounded-2xl py-4 px-5 outline-none text-gray-900"
                                   placeholder="Choose a username (e.g. johnplanner)">
                        </div>

                        <!-- Country -->
                        <div class="mb-6">
                            <label class="block text-sm font-medium text-gray-700 mb-2">Country</label>
                            <select id="country"
                                    class="w-full bg-gray-50 border border-gray-200 focus:border-emerald-500 rounded-2xl py-4 px-5 outline-none text-gray-900">
                                <option value="">Select Country</option>
                                <option value="Kenya">Kenya (+254)</option>
                                <option value="Uganda">Uganda (+256)</option>
                                <option value="Tanzania">Tanzania (+255)</option>
                                <option value="Rwanda">Rwanda (+250)</option>
                                <option value="South Sudan">South Sudan (+211)</option>
                            </select>
                        </div>

                        <!-- Phone Number -->
                        <div class="mb-6">
                            <label class="block text-sm font-medium text-gray-700 mb-2">Phone Number</label>
                            <input type="text" id="phone"
                                required
                                class="w-full bg-gray-50 border border-gray-200 focus:border-emerald-500 rounded-2xl py-4 px-5 outline-none text-gray-900"
                                placeholder="e.g. +254712345678">
                        </div>

                        <!-- Email -->
                        <div class="mb-6">
                            <label class="block text-sm font-medium text-gray-700 mb-2">Email Address</label>
                            <input type="email" id="email" required
                                   class="w-full bg-gray-50 border border-gray-200 focus:border-emerald-500 rounded-2xl py-4 px-5 outline-none text-gray-900"
                                   placeholder="Enter your email">
                        </div>

                        <!-- Password -->
                        <div class="mb-6">
                            <label class="block text-sm font-medium text-gray-700 mb-2">Password</label>
                            <input type="password" id="password" required
                                   class="w-full bg-gray-50 border border-gray-200 focus:border-emerald-500 rounded-2xl py-4 px-5 outline-none text-gray-900"
                                   placeholder="Create a strong password">
                        </div>

                        <!-- Confirm Password -->
                        <div class="mb-8">
                            <label class="block text-sm font-medium text-gray-700 mb-2">Confirm Password</label>
                            <input type="password" id="confirmPassword" required
                                   class="w-full bg-gray-50 border border-gray-200 focus:border-emerald-500 rounded-2xl py-4 px-5 outline-none text-gray-900"
                                   placeholder="Confirm your password">
                        </div>

                        <button type="submit"
                                class="w-full bg-emerald-700 hover:bg-emerald-800 transition-colors text-white font-semibold py-4 rounded-2xl text-lg">
                            Create Account
                        </button>

                    </form>

                    <div class="text-center mt-8">
                        <p class="text-gray-600">
                            Already have an account?
                            <a href="login.html" class="text-emerald-600 font-semibold hover:underline">
                                Sign in here
                            </a>
                        </p>
                    </div>

                </div>
            </div>
        </div>
    </div>

<script>


    document.getElementById('signupForm').addEventListener('submit', async function(e) {

        e.preventDefault();

        const full_name = document.getElementById('fullname').value.trim();

        const username = document.getElementById('username').value.trim().toLowerCase();

        const country = document.getElementById('country').value;

        const phone_number = document.getElementById('phone').value.trim();

        const email = document.getElementById('email').value.trim();

        const password = document.getElementById('password').value;

        const confirmPassword = document.getElementById('confirmPassword').value;


        // VALIDATION
        if (
            !full_name ||
            !username ||
            !country ||
            !phone_number ||
            !email ||
            !password
        ) {
            alert("All fields are required!");
            return;
        }

        if (password !== confirmPassword) {
            alert("Passwords do not match!");
            return;
        }

        if (password.length < 6) {
            alert("Password must be at least 6 characters.");
            return;
        }


        try {

            const response = await fetch('http://127.0.0.1:5000/signup', {

                method: 'POST',

                headers: {
                    'Content-Type': 'application/json'
                },

                body: JSON.stringify({

                    full_name,
                    username,
                    country,
                    phone_number,
                    email,
                    password
                })
            });

            const data = await response.json();

            if (data.success) {

                alert("✅ Account created successfully!");

                window.location.href = "login.html";

            } else {

                alert(data.message);
            }

        } catch (error) {

            console.error(error);

            alert("Server error");
        }
    });


document.getElementById('signupForm').addEventListener('submit', function(e) {
    e.preventDefault();

    const fullname = document.getElementById('fullname').value.trim();
    const username = document.getElementById('username').value.trim().toLowerCase();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const confirmPassword = document.getElementById('confirmPassword').value;

    if (!fullname || !username || !email || !password) {
        alert("All fields are required!");
        return;
    }

    if (password !== confirmPassword) {
        alert("Passwords do not match!");
        return;
    }

    if (password.length < 6) {
        alert("Password must be at least 6 characters.");
        return;
    }

    const users = getAllUsers();
    const usernameExists = users.some(user => user.username === username);

    if (usernameExists) {
        alert("Username already taken.");
        return;
    }

    const newUser = {
        id: Date.now(),
        fullname,
        username,
        email,
        password,
        createdAt: new Date().toISOString()
    };

    saveUser(newUser);

    localStorage.setItem('loggedInUser', email);
    localStorage.setItem('userFullName', fullname);
    localStorage.setItem('username', username);

    alert("✅ Account created successfully!");

    window.location.href = "user-dashboard.html";
});
</script>

</body>
</html>

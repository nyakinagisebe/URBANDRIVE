<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URBANDRIVE KENYA - Sign In</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap');
        
        body { font-family: 'Inter', system_ui, sans-serif; }
        .logo-font { font-family: 'Space Grotesk', sans-serif; }

        .hero-bg {
            background: linear-gradient(rgba(0, 0, 0, 0.45), rgba(0, 0, 0, 0.55)), 
                        url('images/nathan-waters-j7q-Z9DV3zw-unsplash.jpg') center/cover no-repeat;
        }
    </style>
</head>
<body class="bg-gray-950 text-white">
    <div class="min-h-screen flex">
        <!-- Left Side - Hero -->
        <div class="hidden lg:flex w-1/2 hero-bg bg-cover bg-center relative">
            <div class="absolute inset-0 flex flex-col justify-between p-10">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-emerald-400 rounded-xl flex items-center justify-center">
                        <i class="fa-solid fa-building text-white text-2xl"></i>
                    </div>
                    <div>
                        <span class="logo-font text-3xl font-semibold tracking-tight">URBANDRIVE</span>
                        <span class="block text-emerald-400 text-sm font-medium tracking-widest -mt-1">KENYA</span>
                    </div>
                </div>

                <div class="max-w-md">
                    <h1 class="text-4xl font-semibold leading-tight mb-6">
                        Data-driven insights.<br>
                        Better housing decisions.<br>
                        Stronger communities.
                    </h1>
                    <p class="text-lg text-gray-200">
                        AI-powered regional housing needs assessment and decision support system.
                    </p>
                </div>
            </div>
        </div>

        <!-- Right Side - Login Form -->
        <div class="w-full lg:w-1/2 flex items-center justify-center p-8 bg-white">
            <div class="w-full max-w-md">
                <!-- Mobile Logo -->
                <div class="flex lg:hidden items-center gap-3 mb-10">
                    <div class="w-10 h-10 bg-emerald-500 rounded-2xl flex items-center justify-center">
                        <i class="fa-solid fa-building text-white text-3xl"></i>
                    </div>
                    <div>
                        <span class="logo-font text-3xl font-semibold text-gray-900 tracking-tight">URBANDRIVE</span>
                        <span class="block text-emerald-500 text-sm font-medium tracking-widest -mt-1">KENYA</span>
                    </div>
                </div>

                <div class="bg-white rounded-3xl shadow-xl p-8">
                    <h2 class="text-3xl font-semibold text-gray-900 mb-1">Welcome Back!</h2>
                    <p class="text-gray-600 mb-8">Sign in to access your account</p>

                    <form id="loginForm">
                        <div class="mb-6">
                            <label class="block text-sm font-medium text-gray-700 mb-2">Email Address</label>
                            <div class="relative">
                                <div class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400">
                                    <i class="fa-solid fa-envelope"></i>
                                </div>
                                <input type="email" id="email" required
                                       class="w-full bg-gray-50 border border-gray-200 focus:border-emerald-500 rounded-2xl py-4 pl-11 pr-4 outline-none text-gray-900"
                                       placeholder="Enter your email">
                            </div>
                        </div>

                        <div class="mb-6">
                            <label class="block text-sm font-medium text-gray-700 mb-2">Password</label>
                            <div class="relative">
                                <div class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400">
                                    <i class="fa-solid fa-lock"></i>
                                </div>
                                <input type="password" id="password" required
                                       class="w-full bg-gray-50 border border-gray-200 focus:border-emerald-500 rounded-2xl py-4 pl-11 pr-12 outline-none text-gray-900"
                                       placeholder="Enter your password">
                                <button type="button" id="togglePassword"
                                        class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
                                    👁️
                                </button>
                            </div>
                        </div>

                        <div class="flex justify-end mb-8">
                            <a href="#" class="text-emerald-600 hover:text-emerald-700 text-sm font-medium">Forgot password?</a>
                        </div>

                        <button type="submit"
                                class="w-full bg-emerald-700 hover:bg-emerald-800 transition-colors text-white font-semibold py-4 rounded-2xl text-lg">
                            Sign In
                        </button>
                    </form>

                    <div class="text-center mt-8">
                        <p class="text-gray-600">
                            Don't have an account? 
                            <a href="signup.html" class="text-emerald-600 font-semibold hover:underline">Sign up here</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Password Visibility Toggle
        document.getElementById('togglePassword').addEventListener('click', function() {
            const passwordField = document.getElementById('password');
            if (passwordField.type === 'password') {
                passwordField.type = 'text';
                this.textContent = '🙈';
            } else {
                passwordField.type = 'password';
                this.textContent = '👁️';
            }
        });

        // Login Form Submission
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            if (!email || !password) {
                alert("Please fill in all fields.");
                return;
            }

            try {
                const response = await fetch('http://127.0.0.1:5000/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (data.success) {
                    // Store user information
                    localStorage.setItem('user_id', data.user_id);
                    localStorage.setItem('email', data.email);
                    localStorage.setItem('role', data.role);

                    alert(`Login successful! Welcome, ${data.role}.`);

                    // ✅ Role-based Redirect
                    if (data.role === "admin" || data.role === "Admin") {
                        window.location.href = `admin_dash.html?user_id=${data.user_id}&role=admin`;
                    } else {
                        window.location.href = `user_dash.html?user_id=${data.user_id}&role=user`;
                    }

                } else {
                    alert(data.message || "Invalid email or password.");
                }

            } catch (error) {
                console.error(error);
                alert("Unable to connect to server. Please make sure your backend is running.");
            }
        });
    </script>
</body>
</html>
